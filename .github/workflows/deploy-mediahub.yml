name: Deploy MediaHub to Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Build for Cloudflare Pages
        run: npm run build:pages

      - name: Prepare functions for deployment
        run: |
          mkdir -p .vercel/output/functions/api
          cp -r functions/api/* .vercel/output/functions/api/ || true

      - name: Deploy with Wrangler CLI
        run: npx wrangler pages deploy .vercel/output --project-name mediahub-5wd --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
