name: Deploy MediaHub to Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    defaults:
      run:
        working-directory: mediahub

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mediahub/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Build for Cloudflare Pages
        run: npm run build:pages

      - name: Debug: Check paths
        run: |
          pwd
          ls -la .vercel/output/static 2>&1 | head -5 || echo "Static dir not found"
          which wrangler
          echo "CLOUDFLARE_ACCOUNT_ID=$CLOUDFLARE_ACCOUNT_ID"

      - name: Deploy to Cloudflare Pages
        run: npm run deploy 2>&1 | tee deploy.log
        working-directory: mediahub
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Check deploy log
        if: always()
        run: tail -50 deploy.log || echo "No deploy log found"
